[phases.setup]
nixPkgs = ["nodejs"]

[phases.install]
cmds = [
  "npm install -g pnpm corepack",
  "corepack enable",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm build:shared",
  "cd apps/mandate-service && pnpm run build"
]

[start]
cmd = "cd apps/mandate-service && node dist/server.js"
