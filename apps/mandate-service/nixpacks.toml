[phases.setup]
nixPkgs = ["nodejs-20_x"]

[phases.install]
cmds = [
  "npm install -g pnpm corepack",
  "corepack enable",
  "cd ../.. && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd ../.. && pnpm build:shared",
  "cd apps/mandate-service && pnpm run build"
]

[start]
cmd = "node dist/server.js"
