// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Define Android SDK versions for React Native 0.81.5
// These must be set before applying the React Native root project plugin
ext {
    ndkVersion = "27.0.12077973"
    buildToolsVersion = "35.0.0"
    compileSdkVersion = 35  // Required by androidx.core:core:1.16.0
    minSdkVersion = 24  // Required by react-native-screens and react-native-gesture-handler
    targetSdkVersion = 34
}

apply plugin: "com.facebook.react.rootproject"
