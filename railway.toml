[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "cd apps/backend && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "backend"
source = "apps/backend"

[services.healthcheck]
path = "/health"
timeout = 100
interval = 30

[[services.domains]]
# Auto-generated Railway domain
